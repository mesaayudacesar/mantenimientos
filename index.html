<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo - Puntos del Cesar</title>
    <meta name="description"
        content="Visualización interactiva de puntos de venta y centros de atención en el departamento del Cesar">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css?v=2.0">

    <!-- SheetJS (XLSX) para exportación a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <div class="logo-text">
                    <h1>Mapa de Puntos - Cesar</h1>
                    <p>Sistema de Gestión Geográfica</p>
                </div>
            </div>
            <div class="stats-section" id="stats">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-map-pin"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="total-puntos">0</div>
                        <div class="stat-label">Total Puntos</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-eye"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="puntos-visibles">0</div>
                        <div class="stat-label">Visibles</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="total-tecnicos">0</div>
                        <div class="stat-label">Técnicos</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="total-cdas">0</div>
                        <div class="stat-label">CDAs</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Sidebar de filtros -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-filter"></i> Filtros</h2>
                <button class="btn-reset" id="btn-reset">
                    <i class="fas fa-redo"></i>
                    <span>Limpiar</span>
                </button>
            </div>

            <!-- Búsqueda Global -->
            <div class="filter-section global-search-section">
                <div class="filter-header" style="cursor: default; background: transparent;">
                    <i class="fas fa-search"></i>
                    <h3>Búsqueda Global</h3>
                </div>
                <div class="filter-content" style="max-height: none;">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-global" placeholder="Buscar por nombre o código...">
                    </div>
                    <div id="search-navigation" class="search-navigation" style="display: none;">
                        <button id="prev-result" class="nav-btn" title="Resultado anterior">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="search-counter" class="search-counter">0 / 0</span>
                        <button id="next-result" class="nav-btn" title="Siguiente resultado">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div id="search-results" class="search-results"></div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header collapsed" data-filter="tecnicos">
                    <i class="fas fa-user-tie"></i>
                    <h3>Técnicos</h3>
                    <span class="filter-count" id="tecnicos-count">0</span>
                    <i class="fas fa-chevron-down collapse-icon"></i>
                </div>
                <div class="filter-content collapsed" id="tecnicos-content">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-tecnico" placeholder="Buscar técnico...">
                    </div>
                    <div class="filter-list" id="tecnicos-list">
                        <!-- Generado dinámicamente -->
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header collapsed" data-filter="cdas">
                    <i class="fas fa-building"></i>
                    <h3>Centro de Costos</h3>
                    <span class="filter-count" id="cdas-count">0</span>
                    <i class="fas fa-chevron-down collapse-icon"></i>
                </div>
                <div class="filter-content collapsed" id="cdas-content">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-cda" placeholder="Buscar CDA...">
                    </div>
                    <div class="filter-list" id="cdas-list">
                        <!-- Generado dinámicamente -->
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header collapsed" data-filter="tipos">
                    <i class="fas fa-tag"></i>
                    <h3>Tipo de Punto</h3>
                    <span class="filter-count" id="tipos-count">0</span>
                    <i class="fas fa-chevron-down collapse-icon"></i>
                </div>
                <div class="filter-content collapsed" id="tipos-content">
                    <div class="filter-list" id="tipos-list">
                        <!-- Generado dinámicamente -->
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header collapsed" data-filter="mantenimiento">
                    <i class="fas fa-tools"></i>
                    <h3>Mantenimiento</h3>
                    <span class="filter-count" id="mantenimiento-count">0</span>
                    <i class="fas fa-chevron-down collapse-icon"></i>
                </div>
                <div class="filter-content collapsed" id="mantenimiento-content">
                    <div class="filter-list" id="mantenimiento-list">
                        <!-- Generado dinámicamente -->
                    </div>
                    <button class="btn-export" id="btn-export-mantenimiento">
                        <i class="fas fa-file-export"></i>
                        <span>Exportar Reporte</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Toggle sidebar button -->
        <button class="sidebar-toggle" id="sidebar-toggle">
            <i class="fas fa-chevron-left toggle-icon"></i>
        </button>

        <!-- Mapa -->
        <div class="map-container">
            <div id="map"></div>
            <div class="map-controls">
                <button class="map-btn" id="btn-center" title="Centrar mapa en Cesar">
                    <i class="fas fa-crosshairs"></i>
                </button>
                <button class="map-btn" id="btn-layers" title="Cambiar capa del mapa">
                    <i class="fas fa-layer-group"></i>
                </button>
            </div>
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p>Cargando puntos del Cesar...</p>
            </div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Modal de Mantenimiento -->
    <div class="modal-overlay" id="modal-mantenimiento">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-tools"></i> Editar Mantenimiento Preventivo</h2>
                <button class="modal-close" id="btn-close-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="punto-info">
                    <p><strong>Punto:</strong> <span id="modal-punto-nombre">-</span></p>
                    <p><strong>Código:</strong> <span id="modal-punto-codigo">-</span></p>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="modal-mantenimiento-realizado">
                        <span class="checkbox-custom"></span>
                        <span>Mantenimiento Preventivo Realizado</span>
                    </label>
                </div>
                <div class="form-group" id="ticket-group" style="display: none;">
                    <label for="modal-numero-ticket">Número de Ticket</label>
                    <input type="text" id="modal-numero-ticket" placeholder="Ej: TICKET-12345" maxlength="50">
                </div>
                <div class="form-group" id="fecha-group" style="display: none;">
                    <label for="modal-fecha-mantenimiento">Fecha de Mantenimiento</label>
                    <input type="date" id="modal-fecha-mantenimiento">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="btn-cancelar-modal">Cancelar</button>
                <button class="btn-primary" id="btn-guardar-mantenimiento">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- App JS -->
    <script src="app.js?v=2.0"></script>
</body>

</html>
